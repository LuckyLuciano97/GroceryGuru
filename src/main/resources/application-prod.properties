spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# First deploy: 'update' so Hibernate creates the schema on the fresh Railway DB.
# Once the schema is stable, tighten to 'validate'.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Batch processing (same as dev - ingestion relies on it)
spring.jpa.properties.hibernate.jdbc.batch_size=500
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

server.port=${PORT:8080}
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# JWT - secret MUST come from the environment in production (set in Railway
# service variables). No default on purpose: fail fast if it's missing.
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Price ingestion schedules (same defaults as dev; cijene ingestion stays opt-in)
ingestion.cron=0 0 8 * * *
ingestion.plodine.url-pattern=https://www.plodine.hr/cjenici/cjenici_{date}_07_00_01.zip
ingestion.konzum.page-url=https://www.konzum.hr/cjenici
ingestion.cijene.enabled=${CIJENE_INGESTION_ENABLED:false}
ingestion.cijene.cron=0 0 7 * * *

# Comma-separated list of allowed browser origins (web frontend URL).
# Native mobile apps don't send an Origin header, so they're unaffected.
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
