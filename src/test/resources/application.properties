# Test configuration - ALWAYS uses an in-memory H2 database.
# This file shadows src/main/resources/application.properties on the test
# classpath, so tests can never connect to (or delete from!) the real DB.

spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
# Run schema.sql (registers the H2 similarity() stub) after Hibernate creates tables.
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

server.port=0

# JWT (test-only values)
jwt.secret=TestOnlySecretKeyForJwtUnitTestsThatIsLongEnough256BitsPadPad!
jwt.expiration=86400000

# Ingestion properties referenced by beans - schedules never fire in tests
ingestion.cron=0 0 8 * * *
ingestion.plodine.url-pattern=https://example.invalid/cjenici_{date}.zip
ingestion.konzum.page-url=https://example.invalid/cjenici
ingestion.cijene.enabled=false
ingestion.cijene.cron=0 0 7 * * *
